  document.getElementById('books-heading').textContent = c.booksHeading;

    const orig = b.orig ? ` <span class="book-orig">(${b.orig})</span>` : '';

    return `<li><a class="book-title-link" href="/kitap/${b.slug}/">${b.title}</a>${orig}${note} <span class="book-year">· ${b.year}</span></li>`;
  }).join('');

  document.querySelectorAll('#lang-switch button').forEach(btn => {
    btn.classList.toggle('current', btn.dataset.lang === lang);
  });

  document.documentElement.lang = lang;
}

document.getElementById('lang-switch').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn || btn.classList.contains('current')) return;
  renderLang(btn.dataset.lang);
});

renderLang('tr');
</script>
</body>
</html>
